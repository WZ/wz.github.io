<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wilson Li</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17212b;
      --muted: #5d6975;
      --line: #d8dee6;
      --paper: #ffffff;
      --accent: #0c6b83;
      --soft: #eef7f8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--ink);
      background: var(--paper);
      font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(760px, calc(100% - 32px));
      padding: 56px 0;
    }

    .mark {
      display: inline-grid;
      place-items: center;
      width: 54px;
      height: 54px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0;
    }

    h1 {
      margin: 22px 0 10px;
      font-size: clamp(36px, 7vw, 72px);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      max-width: 560px;
      margin: 0;
      color: var(--muted);
      font-size: 18px;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    a {
      color: var(--accent);
      text-decoration-thickness: 1px;
      text-underline-offset: 4px;
    }
  </style>
</head>
<body>
  <main>
    <div class="mark">WL</div>
    <h1>Wilson Li</h1>
    <p>This site is being set up. More will be here soon.</p>
    <div class="links" aria-label="links">
      <a href="https://github.com/wz">GitHub</a>
    </div>
  </main>
</body>
</html>
